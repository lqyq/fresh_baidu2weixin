name: 自动转存百度网盘资源

on:
  schedule:
    # 每30分钟运行一次
    - cron: '*/30 * * * *'
  # 手动触发（在GitHub Actions页面点击Run workflow）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检查代码仓库
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: 运行转存脚本
      env:
        COOKIE: ${{ secrets.COOKIE }}
        COUNT: ${{ secrets.COUNT }}
        TARGET_FOLDER: ${{ secrets.TARGET_FOLDER }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        CACHE_EXPIRE_HOURS: ${{ secrets.CACHE_EXPIRE_HOURS }}
      run: python baidu_fetch_share.py

    - name: 配置 Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: 提交缓存文件
      run: |
        if [ -f api_cache.json ]; then
          git add api_cache.json
          git diff --cached --quiet || git commit -m "Update API cache"
          git push https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
        fi
